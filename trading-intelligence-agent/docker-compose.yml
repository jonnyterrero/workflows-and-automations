version: "3.9"

x-common: &common
  build:
    context: .
    dockerfile: infra/docker/Dockerfile.base
  env_file: .env
  environment:
    - PYTHONPATH=/app
    - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/trading_intel
    - DEMO_MODE=true
  volumes:
    - .:/app
  restart: unless-stopped

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: trading_intel
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d trading_intel"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    <<: *common
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.api
    command: uvicorn apps.api_service.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  scheduler:
    <<: *common
    command: python -m apps.scheduler_service.main
    depends_on:
      postgres:
        condition: service_healthy

  worker:
    <<: *common
    command: python -m apps.worker_service.main
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:

networks:
  default:
    name: trading_intel_net
